<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TruckDeck — ETS2 & ATS Telemetry Dashboards{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="theme-night">
    <nav class="main-nav">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="TruckDeck" class="nav-logo-icon">
                <span>TRUCKDECK</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a>
                <a href="{{ url_for('live_demo_page') }}" class="{% if request.endpoint == 'live_demo_page' %}active{% endif %}">Live Demo</a>
                <a href="{{ url_for('downloads_page') }}" class="{% if request.endpoint == 'downloads_page' %}active{% endif %}">Download</a>
                <a href="{{ url_for('reviews_page') }}" class="{% if request.endpoint == 'reviews_page' %}active{% endif %}">Reviews</a>
                <a href="{{ url_for('contributors_page') }}" class="{% if request.endpoint == 'contributors_page' %}active{% endif %}">Contributors</a>
            </div>
            <div class="nav-controls">
                <button id="day-night-toggle" title="Toggle Day/Night Mode">🌙</button>
                <button id="color-cycle-toggle" title="Cycle Accent Color">🎨</button>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <p>TruckDeck {{ version }} · Built with ❤️ for the trucking community.</p>
            <p>&copy; 2026 TruckDeck. Based on Funbit ETS2 Telemetry Server.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
